name: Skill Health

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  doctor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: python3 -m pip install -r requirements.txt
      - name: Run read-only skill doctor
        run: python3 scripts/skill_maintenance.py doctor --json
      - name: Preview remote update state
        run: python3 scripts/skill_maintenance.py update --dry-run --json
