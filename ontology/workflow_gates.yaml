version: 1
workflow_gates:
  - name: EvidenceGate
    purpose: Material claims require evidence links.
    required_objects:
      - Claim
      - EvidenceItem
    pass_conditions:
      - high_materiality_claims_have_evidence
      - report_sections_cite_material_evidence
  - name: SourcePriorityGate
    purpose: Conflicting facts follow source priority.
    required_objects:
      - SourceDocument
      - EvidenceItem
      - Claim
    pass_conditions:
      - primary_sources_preferred
      - conflict_resolution_recorded
  - name: OrderGate
    purpose: Order evidence is graded before valuation use.
    required_objects:
      - ContractOrder
      - OrderQualityAssessment
    pass_conditions:
      - order_quality_grade_present
      - weak_order_signals_do_not_drive_target
  - name: FinancialGate
    purpose: Earnings quality and cash conversion are reconciled.
    required_objects:
      - MetricObservation
      - FinancialQualityAssessment
    pass_conditions:
      - ocf_net_income_reconciled
      - working_capital_driver_named
  - name: DebtGate
    purpose: Debt, cash, maturity, interest, dilution, and share count feed valuation.
    required_objects:
      - DebtInstrument
      - DilutionInstrument
      - ValuationCase
    pass_conditions:
      - net_debt_bridge_present
      - diluted_share_count_present
      - maturity_wall_addressed
  - name: ValuationGate
    purpose: Current-market-implied expectation precedes target value.
    required_objects:
      - CurrentMarketImpliedBridge
      - ValuationMethodSelection
      - ValuationCase
    pass_conditions:
      - current_implied_bridge_present
      - one_primary_method_only
      - equity_bridge_present_or_blocked
  - name: ShortRiskGate
    purpose: Elevated short risk affects valuation or position size.
    required_objects:
      - ShortRiskSignal
      - ShortSellerAssessment
    pass_conditions:
      - grade_present
      - risk_effect_linked_to_valuation_or_trade_plan
  - name: TechnicalGate
    purpose: Technical levels are fresh, adjusted where needed, and supported.
    required_objects:
      - TechnicalSetup
      - TradePlan
    pass_conditions:
      - chart_date_present
      - adjusted_status_present
      - entry_stop_take_profit_present_or_blocked
  - name: DataGapGate
    purpose: Missing data blocks unsupported conclusions.
    required_objects:
      - DataGap
      - ReportSection
    pass_conditions:
      - blocked_conclusions_marked
      - target_or_levels_blocked_when_required
