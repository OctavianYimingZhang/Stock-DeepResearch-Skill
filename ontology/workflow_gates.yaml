version: 1
workflow_gates:
  - name: LakehouseLayerGate
    purpose: Research objects flow from Bronze to Silver to Gold to Report View.
    required_objects:
      - SourceSnapshot
      - SourcePartition
      - EvidenceItem
      - Claim
      - ReportSection
    pass_conditions:
      - bronze_source_snapshot_preserved
      - silver_objects_have_bronze_lineage
      - gold_objects_have_silver_lineage
  - name: SettingsGate
    purpose: Runtime settings are complete and separated from factual evidence.
    required_objects:
      - ResearchSettings
      - UserHypothesis
      - ResearchRun
    pass_conditions:
      - required_settings_present
      - user_hypothesis_not_treated_as_evidence
      - output_view_selected
  - name: LineageGate
    purpose: Material conclusions preserve source-to-report lineage.
    required_objects:
      - SourceSnapshot
      - EvidenceItem
      - Claim
      - ReportSection
      - ResearchRun
    pass_conditions:
      - material_claims_trace_to_source_snapshot
      - report_sections_trace_to_claims_and_evidence
      - research_run_records_input_sources
  - name: PartitionCoverageGate
    purpose: Evidence partition metadata covers the current analysis scope.
    required_objects:
      - SourcePartition
      - EvidencePartition
      - EvidenceItem
      - Claim
    pass_conditions:
      - source_partitions_built_before_extraction
      - relevant_partitions_identified
      - high_conflict_partitions_resolved_or_blocked
      - stale_partitions_not_used_for_targets
  - name: EvidenceGate
    purpose: Material claims require evidence links.
    required_objects:
      - Claim
      - EvidenceItem
    pass_conditions:
      - high_materiality_claims_have_evidence
      - report_sections_cite_material_evidence
  - name: SourcePriorityGate
    purpose: Conflicting facts follow source priority.
    required_objects:
      - SourceDocument
      - EvidenceItem
      - Claim
    pass_conditions:
      - primary_sources_preferred
      - conflict_resolution_recorded
  - name: OrderGate
    purpose: Order evidence is graded before valuation use.
    required_objects:
      - ContractOrder
      - OrderQualityAssessment
    pass_conditions:
      - order_quality_grade_present
      - weak_order_signals_do_not_drive_target
  - name: FinancialGate
    purpose: Earnings quality and cash conversion are reconciled.
    required_objects:
      - MetricObservation
      - FinancialQualityAssessment
    pass_conditions:
      - ocf_net_income_reconciled
      - working_capital_driver_named
  - name: DebtGate
    purpose: Debt, cash, maturity, interest, dilution, and share count feed valuation.
    required_objects:
      - DebtInstrument
      - DilutionInstrument
      - EquityBridge
    pass_conditions:
      - net_debt_bridge_present
      - diluted_share_count_present
      - maturity_wall_addressed
  - name: EquityBridgeGate
    purpose: Per-share target is blocked unless EV-to-equity bridge reconciles.
    required_objects:
      - EquityBridge
      - DebtInstrument
      - DilutionInstrument
      - ValuationCase
    pass_conditions:
      - senior_claims_included_or_blocked
      - net_debt_reconciled_or_blocked
      - diluted_share_count_reconciled_or_blocked
      - target_price_blocked_when_bridge_unresolved
  - name: ValuationGate
    purpose: Current-market-implied expectation precedes target value.
    required_objects:
      - CurrentMarketImpliedBridge
      - ValuationMethodSelection
      - ValuationCase
      - EquityBridge
    pass_conditions:
      - current_implied_bridge_present
      - one_primary_method_only
      - equity_bridge_present_or_blocked
  - name: ShortRiskGate
    purpose: Elevated short risk affects valuation or position size.
    required_objects:
      - ShortRiskSignal
      - ShortSellerAssessment
    pass_conditions:
      - grade_present
      - risk_effect_linked_to_valuation_or_trade_plan
  - name: TechnicalGate
    purpose: Technical levels are fresh, adjusted where needed, and supported.
    required_objects:
      - TechnicalSetup
      - TradePlan
    pass_conditions:
      - chart_date_present
      - adjusted_status_present
      - entry_stop_take_profit_present_or_blocked
  - name: FreshnessGate
    purpose: Stale objects cannot drive valuation or technical levels.
    required_objects:
      - SourceSnapshot
      - SourcePartition
      - EvidencePartition
      - Claim
      - TechnicalSetup
    pass_conditions:
      - source_snapshot_freshness_set
      - stale_claims_marked
      - stale_technical_levels_blocked
  - name: OutputViewGate
    purpose: Output view changes projection without changing the source graph.
    required_objects:
      - ResearchSettings
      - OutputView
      - ReportSection
    pass_conditions:
      - view_projection_selected
      - required_sections_present_for_view
      - source_graph_unchanged_by_projection
  - name: IncrementalRefreshGate
    purpose: Changed sources refresh only dependent objects unless full rerun is needed.
    required_objects:
      - ResearchRun
      - SourceSnapshot
      - IncrementalRefreshPlan
      - ActionExecution
    pass_conditions:
      - changed_source_classified
      - affected_partitions_identified
      - dependent_objects_refreshed_or_blocked
      - fallback_to_full_rerun_recorded_when_needed
  - name: DataGapGate
    purpose: Missing data blocks unsupported conclusions.
    required_objects:
      - DataGap
      - ReportSection
    pass_conditions:
      - blocked_conclusions_marked
      - target_or_levels_blocked_when_required
