name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: python3 -m pip install -r requirements.txt
      - name: Run repository validation
        run: python3 scripts/validate.py
      - name: Run report output contract validation
        run: python3 scripts/validate_report_output.py evals/fixtures/report-contract-fixture.md
